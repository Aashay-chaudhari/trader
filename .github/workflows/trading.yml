# Two-phase trading pipeline running on GitHub Actions (free tier).
#
# Phase 1 - Morning Research (9:00 AM ET = 14:00 UTC):
#   Screens stocks, fetches data, runs Claude analysis.
#   Produces today's watchlist and research insights.
#
# Phase 2 - Monitor & Trade (every 30 min from 9:30 AM - 4:00 PM ET):
#   Refreshes prices, checks for signals, executes approved trades.
#   Each run is logged to the trade journal.
#
# Budget: ~15 runs/day × ~1.5 min = ~22 min/day × 20 trading days = ~450 min/month
# Well within GitHub's free 2000 min/month.

name: Trading Pipeline

on:
  schedule:
    # Phase 1: Morning research at 9:00 AM ET (14:00 UTC) weekdays
    - cron: '0 14 * * 1-5'

    # Phase 2: Monitor every 30 min from 9:30 AM - 4:00 PM ET
    # (14:30 - 21:00 UTC) weekdays
    - cron: '30 14 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '30 15 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '30 17 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '30 18 * * 1-5'
    - cron: '0 19 * * 1-5'
    - cron: '30 19 * * 1-5'
    - cron: '0 20 * * 1-5'
    - cron: '30 20 * * 1-5'

  workflow_dispatch:
    inputs:
      phase:
        description: 'Which phase to run'
        required: true
        default: 'run'
        type: choice
        options:
          - research
          - monitor
          - run
      llm_provider:
        description: 'Preferred LLM provider'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - anthropic
          - openai

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Determine phase
        id: phase
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "phase=${{ inputs.phase }}" >> $GITHUB_OUTPUT
          else
            # Check current UTC hour to determine phase
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            if [ "$HOUR" = "14" ] && [ "$MINUTE" -lt "30" ]; then
              echo "phase=research" >> $GITHUB_OUTPUT
            else
              echo "phase=monitor" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run trading pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          LLM_PROVIDER: ${{ inputs.llm_provider || vars.LLM_PROVIDER || 'auto' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
        run: python -m agent_trader ${{ steps.phase.outputs.phase }}

      - name: Generate dashboard
        run: python -m agent_trader dashboard

      - name: Build artifact stamp
        id: artifact_stamp
        if: always()
        run: echo "stamp=$(date -u +%Y-%m-%dT%H%MZ)" >> $GITHUB_OUTPUT

      - name: Upload trading artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-trader-${{ steps.phase.outputs.phase }}-${{ steps.artifact_stamp.outputs.stamp }}
          path: |
            data/journal/
            data/research/
            data/context/
            data/analytics/
            data/cache/
            docs/data/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit results
        run: |
          git config user.name "Agent Trader Bot"
          git config user.email "bot@agent-trader"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "[${{ steps.phase.outputs.phase }}] $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push

  deploy-dashboard:
    needs: trade
    runs-on: ubuntu-latest
    # Deploy on every manual trigger and on the last monitor run of the day
    if: github.event_name == 'workflow_dispatch' || (github.event.schedule == '30 20 * * 1-5')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Pull latest (trade job may have pushed)
        run: git pull --ff-only origin main || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
