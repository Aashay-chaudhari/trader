# Dual-strategist trading pipeline running on GitHub Actions.
#
# Each scheduled/manual run executes two independent strategist books:
#   1. Claude CLI primary, Anthropic API fallback
#   2. Codex CLI primary, OpenAI API fallback
#
# Their artifacts are stored separately under data/profiles/<strategist>/ and
# then merged into one dashboard deployment for GitHub Pages comparison.

name: Trading Pipeline

on:
  schedule:
    # Phase 2: Monitor & Trade — every 30 min, 9:30 AM – 4:00 PM ET weekdays
    # This is the ONLY automated phase. Morning research, evening reflection,
    # weekly reviews, and monthly retrospectives are done locally via Claude Code
    # (see scripts/prompts/ for the workflow prompts).
    #
    # DST note: GitHub Actions cron is always UTC. These times cover the
    # US market window in BOTH Eastern Standard (UTC-5) and Eastern Daylight
    # (UTC-4). The Python-side market-hours guard (_is_market_hours) handles
    # the precise check, so an extra cron firing outside hours is harmless.
    - cron: "30 13 * * 1-5"   #  9:30 AM EDT / 8:30 AM EST (caught by guard in winter)
    - cron: "0 14 * * 1-5"    # 10:00 AM EDT / 9:00 AM EST
    - cron: "30 14 * * 1-5"   # 10:30 AM EDT / 9:30 AM EST
    - cron: "0 15 * * 1-5"    # 11:00 AM EDT / 10:00 AM EST
    - cron: "30 15 * * 1-5"   # 11:30 AM EDT / 10:30 AM EST
    - cron: "0 16 * * 1-5"    # 12:00 PM EDT / 11:00 AM EST
    - cron: "30 16 * * 1-5"   # 12:30 PM EDT / 11:30 AM EST
    - cron: "0 17 * * 1-5"    #  1:00 PM EDT / 12:00 PM EST
    - cron: "30 17 * * 1-5"   #  1:30 PM EDT / 12:30 PM EST
    - cron: "0 18 * * 1-5"    #  2:00 PM EDT /  1:00 PM EST
    - cron: "30 18 * * 1-5"   #  2:30 PM EDT /  1:30 PM EST
    - cron: "0 19 * * 1-5"    #  3:00 PM EDT /  2:00 PM EST
    - cron: "30 19 * * 1-5"   #  3:30 PM EDT /  2:30 PM EST
    - cron: "0 20 * * 1-5"    #  4:00 PM EDT /  3:00 PM EST
    - cron: "30 20 * * 1-5"   #  4:30 PM EDT /  3:30 PM EST
    - cron: "0 21 * * 1-5"    #  5:00 PM EDT /  4:00 PM EST (catches 4PM close in winter)

  workflow_dispatch:
    inputs:
      phase:
        description: "Which phase to run. 'seed' = full cycle (use with reset_state=true for first run)"
        required: true
        default: "run"
        type: choice
        options:
          - research
          - monitor
          - run
          - cycle
          - seed
          - reflect
          - weekly
          - monthly
      strategists:
        description: "Which strategist books to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - claude
          - codex
      low_cost_mode:
        description: "Downgrade to Haiku/mini + tighter limits (does NOT change template/dry-run — that is PRODUCTION_MODE)"
        required: true
        default: true
        type: boolean
      reset_state:
        description: "Reset stored runtime state before running"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  determine-phase:
    runs-on: ubuntu-latest
    outputs:
      phase: ${{ steps.phase.outputs.phase }}
      strategist_matrix: ${{ steps.phase.outputs.strategist_matrix }}
    steps:
      - name: Determine phase
        id: phase
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SELECTED_PHASE="${{ inputs.phase }}"
            if [ "$SELECTED_PHASE" = "seed" ]; then
              # Seed mode runs the full daily + reflection + weekly + monthly loop.
              echo "phase=cycle" >> "$GITHUB_OUTPUT"
            else
              echo "phase=$SELECTED_PHASE" >> "$GITHUB_OUTPUT"
            fi
          else
            # Only monitor crons are scheduled — all other phases run locally
            echo "phase=monitor" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SELECTED_STRATEGISTS="${{ inputs.strategists }}"
          else
            SELECTED_STRATEGISTS="both"
          fi

          if [ "$SELECTED_STRATEGISTS" = "claude" ]; then
            echo 'strategist_matrix=[{"profile_id":"claude","profile_label":"Claude Strategist","cli_provider":"claude","llm_provider":"anthropic","npm_package":"@anthropic-ai/claude-code@latest","version_command":"claude --version"}]' >> "$GITHUB_OUTPUT"
          elif [ "$SELECTED_STRATEGISTS" = "codex" ]; then
            echo 'strategist_matrix=[{"profile_id":"codex","profile_label":"Codex Strategist","cli_provider":"codex","llm_provider":"openai","npm_package":"@openai/codex@latest","version_command":"codex --version"}]' >> "$GITHUB_OUTPUT"
          else
            echo 'strategist_matrix=[{"profile_id":"claude","profile_label":"Claude Strategist","cli_provider":"claude","llm_provider":"anthropic","npm_package":"@anthropic-ai/claude-code@latest","version_command":"claude --version"},{"profile_id":"codex","profile_label":"Codex Strategist","cli_provider":"codex","llm_provider":"openai","npm_package":"@openai/codex@latest","version_command":"codex --version"}]' >> "$GITHUB_OUTPUT"
          fi

  strategist-run:
    name: Strategist Run (${{ matrix.profile_id }})
    needs: determine-phase
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.determine-phase.outputs.strategist_matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -e .

      - name: Install strategist CLI
        run: |
          npm install -g "${{ matrix.npm_package }}"
          ${{ matrix.version_command }}

      - name: Print strategist auth plan
        run: |
          echo "Strategist profile: ${{ matrix.profile_id }}"
          echo "CLI provider: ${{ matrix.cli_provider }}"
          echo "API fallback provider: ${{ matrix.llm_provider }}"
          if [ "${{ matrix.cli_provider }}" = "claude" ]; then
            echo "Auth path: claude CLI first, anthropic API fallback."
            echo "No codex login step will run for this strategist."
          else
            echo "Auth path: codex CLI first, openai API fallback."
            echo "Codex CLI login via OPENAI_API_KEY is required."
          fi

      - name: Verify Claude auth mode (Claude strategist only)
        if: matrix.cli_provider == 'claude'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY detected for Claude API fallback."
          else
            echo "ANTHROPIC_API_KEY missing. Claude CLI-only mode is expected."
          fi

      - name: Authenticate Codex CLI with OPENAI_API_KEY (Codex strategist only)
        if: matrix.cli_provider == 'codex'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY"
          printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key
          codex login status

      - name: Reset strategist state
        if: github.event_name == 'workflow_dispatch' && inputs.reset_state == true
        env:
          DATA_DIR: data/profiles/${{ matrix.profile_id }}
          AGENT_PROFILE: ${{ matrix.profile_id }}
          AGENT_LABEL: ${{ matrix.profile_label }}
        run: python -m agent_trader reset

      # ── Master production switch ──────────────────────────────────────────
      # PRODUCTION_MODE is a single repo variable (Settings → Variables → Actions)
      # that controls both LLM calls and trading behaviour:
      #
      #   PRODUCTION_MODE unset / false  →  DEBUG_MODE=true  + DRY_RUN=true
      #     Use this while developing. Template responses, zero API cost,
      #     no Alpaca orders. Safe to run as often as you like.
      #
      #   PRODUCTION_MODE=true           →  DEBUG_MODE=false + DRY_RUN=false
      #     Real Claude/Codex LLM calls + real Alpaca paper orders.
      #     Flip this when you're ready to go live.
      #
      # low_cost_mode (workflow_dispatch input) is separate: it downgrades
      # models to Haiku/mini and tightens token limits, but does NOT change
      # the template/paper-trading switch — that is always PRODUCTION_MODE.
      # ─────────────────────────────────────────────────────────────────────
      - name: Apply PRODUCTION_MODE defaults
        run: |
          if [ "${{ vars.PRODUCTION_MODE }}" = "true" ]; then
            echo "PRODUCTION_MODE=true → real LLMs + real paper orders"
            echo "DEBUG_MODE=false" >> "$GITHUB_ENV"
            echo "DRY_RUN=false"    >> "$GITHUB_ENV"
          else
            echo "PRODUCTION_MODE unset/false → dev mode (templates + dry run)"
            echo "DEBUG_MODE=true" >> "$GITHUB_ENV"
            echo "DRY_RUN=true"    >> "$GITHUB_ENV"
          fi

      - name: Configure low-cost model mode
        # Reduces LLM cost: Haiku instead of Sonnet, fewer stocks, tighter limits.
        # Does NOT change DEBUG_MODE or DRY_RUN — those are set by PRODUCTION_MODE.
        if: github.event_name == 'workflow_dispatch' && inputs.low_cost_mode == true
        run: |
          echo "DEBUG_MAX_STOCKS=2"          >> "$GITHUB_ENV"
          echo "DEBUG_SKIP_WEB=true"         >> "$GITHUB_ENV"
          echo "CLI_AGENT_MAX_TURNS=1"       >> "$GITHUB_ENV"
          echo "CLI_AGENT_TIMEOUT=120"       >> "$GITHUB_ENV"
          echo "LLM_MAX_OUTPUT_TOKENS=700"   >> "$GITHUB_ENV"
          echo "LLM_MAX_PROMPT_CHARS=16000"  >> "$GITHUB_ENV"
          echo "RESEARCH_MODEL_OPENAI=gpt-4o-mini" >> "$GITHUB_ENV"
          if [ "${{ matrix.cli_provider }}" = "claude" ]; then
            echo "RESEARCH_MODEL=claude-haiku-4-5-20251001" >> "$GITHUB_ENV"
            echo "MONITOR_MODEL=claude-haiku-4-5-20251001"  >> "$GITHUB_ENV"
          fi

      - name: Print strategist runtime config
        run: |
          echo "profile=${{ matrix.profile_id }}"
          echo "phase=${{ needs.determine-phase.outputs.phase }}"
          echo "cli_provider=${{ matrix.cli_provider }}"
          echo "api_provider=${{ matrix.llm_provider }}"
          echo "production_mode=${{ vars.PRODUCTION_MODE || 'false' }}"
          echo "effective_debug_mode=${DEBUG_MODE:-true}"
          echo "effective_dry_run=${DRY_RUN:-true}"
          echo "low_cost_mode=${{ github.event_name == 'workflow_dispatch' && inputs.low_cost_mode || false }}"

      - name: Run strategist pipeline
        env:
          ANTHROPIC_API_KEY: ${{ matrix.cli_provider == 'claude' && secrets.ANTHROPIC_API_KEY || '' }}
          OPENAI_API_KEY: ${{ matrix.cli_provider == 'codex' && secrets.OPENAI_API_KEY || '' }}
          # Per-strategist Alpaca keys allow separate paper accounts for each book.
          # Falls back to shared ALPACA_API_KEY if per-strategist keys aren't set.
          ALPACA_API_KEY: ${{ matrix.profile_id == 'claude' && secrets.ALPACA_API_KEY_CLAUDE || matrix.profile_id == 'codex' && secrets.ALPACA_API_KEY_CODEX || secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ matrix.profile_id == 'claude' && secrets.ALPACA_SECRET_KEY_CLAUDE || matrix.profile_id == 'codex' && secrets.ALPACA_SECRET_KEY_CODEX || secrets.ALPACA_SECRET_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          DATA_DIR: data/profiles/${{ matrix.profile_id }}
          AGENT_PROFILE: ${{ matrix.profile_id }}
          AGENT_LABEL: ${{ matrix.profile_label }}
          DRY_RUN: ${{ env.DRY_RUN || 'true' }}
          RESEARCH_MODEL_OPENAI: ${{ env.RESEARCH_MODEL_OPENAI || vars.RESEARCH_MODEL_OPENAI || 'gpt-4o-mini' }}
          USE_CLI_AGENT: "true"
          CLI_AGENT_PROVIDER: ${{ matrix.cli_provider }}
          LLM_PROVIDER: ${{ matrix.llm_provider }}
        run: |
          : "${CLI_AGENT_MAX_TURNS:=${{ vars.CLI_AGENT_MAX_TURNS || '5' }}}"
          : "${CLI_AGENT_TIMEOUT:=${{ vars.CLI_AGENT_TIMEOUT || '300' }}}"
          export CLI_AGENT_MAX_TURNS
          export CLI_AGENT_TIMEOUT
          echo "effective_cli_max_turns=$CLI_AGENT_MAX_TURNS"
          echo "effective_cli_timeout=$CLI_AGENT_TIMEOUT"
          echo "effective_debug_mode=${DEBUG_MODE:-false}"
          echo "effective_llm_max_output_tokens=${LLM_MAX_OUTPUT_TOKENS:-unset}"
          echo "effective_llm_max_prompt_chars=${LLM_MAX_PROMPT_CHARS:-unset}"
          PHASE="${{ needs.determine-phase.outputs.phase }}"
          if [ "$PHASE" = "cycle" ]; then
            python -m agent_trader cycle
          else
            python -m agent_trader "$PHASE"
          fi

      - name: Check strategist analysis mode used
        if: always()
        env:
          DATA_DIR: data/profiles/${{ matrix.profile_id }}
          AGENT_PROFILE: ${{ matrix.profile_id }}
          AGENT_LABEL: ${{ matrix.profile_label }}
        run: python -m agent_trader.utils.check_mode

      - name: Upload strategist artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategist-${{ matrix.profile_id }}-${{ needs.determine-phase.outputs.phase }}
          path: data/profiles/${{ matrix.profile_id }}/
          if-no-files-found: warn
          retention-days: 30

  publish-results:
    needs:
      - determine-phase
      - strategist-run
    if: always() && needs.determine-phase.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Pull latest
        run: git pull --ff-only origin main || true

      - name: Reset merged project state
        if: github.event_name == 'workflow_dispatch' && inputs.reset_state == true
        run: python -m agent_trader reset --all-profiles --docs

      - name: Clean previous strategist bundles
        run: |
          rm -rf data/profiles/claude data/profiles/codex docs/data/profiles
          mkdir -p data/profiles docs/data

      - name: Download Claude strategist artifacts
        if: github.event_name != 'workflow_dispatch' || inputs.strategists == 'both' || inputs.strategists == 'claude'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: strategist-claude-${{ needs.determine-phase.outputs.phase }}
          path: data/profiles/claude

      - name: Download Codex strategist artifacts
        if: github.event_name != 'workflow_dispatch' || inputs.strategists == 'both' || inputs.strategists == 'codex'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: strategist-codex-${{ needs.determine-phase.outputs.phase }}
          path: data/profiles/codex

      - name: Generate merged dashboard
        run: python -m agent_trader dashboard

      - name: Commit results
        run: |
          git config user.name "Agent Trader Bot"
          git config user.email "bot@agent-trader"
          git add -A data/profiles docs/
          git diff --staged --quiet || git commit -m "[${{ needs.determine-phase.outputs.phase }}] $(date -u +%Y-%m-%d\ %H:%M\ UTC) dual-strategist update"
          git push

  deploy-dashboard:
    needs: publish-results
    runs-on: ubuntu-latest
    if: needs.publish-results.result == 'success'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Pull latest
        run: git pull --ff-only origin main || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
