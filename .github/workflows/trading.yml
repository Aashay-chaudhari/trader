# Dual-strategist trading pipeline running on GitHub Actions.
#
# Each scheduled/manual run executes two independent strategist books:
#   1. Claude CLI primary, Anthropic API fallback
#   2. Codex CLI primary, OpenAI API fallback
#
# Their artifacts are stored separately under data/profiles/<strategist>/ and
# then merged into one dashboard deployment for GitHub Pages comparison.

name: Trading Pipeline

on:
  schedule:
    # Phase 1: Morning research at 9:00 AM ET (14:00 UTC) weekdays
    - cron: "0 14 * * 1-5"

    # Phase 2: Monitor every 30 min from 9:30 AM - 4:00 PM ET
    # (14:30 - 21:00 UTC) weekdays
    - cron: "30 14 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "30 15 * * 1-5"
    - cron: "0 16 * * 1-5"
    - cron: "30 16 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "30 17 * * 1-5"
    - cron: "0 18 * * 1-5"
    - cron: "30 18 * * 1-5"
    - cron: "0 19 * * 1-5"
    - cron: "30 19 * * 1-5"
    - cron: "0 20 * * 1-5"
    - cron: "30 20 * * 1-5"

    # Phase 3: Evening reflection at 4:15 PM ET (21:15 UTC) weekdays
    - cron: "15 21 * * 1-5"

    # Phase 4: Weekly review Sunday 8 PM ET (Monday 01:00 UTC)
    - cron: "0 1 * * 1"

    # Phase 5: Monthly retrospective — last business days, 5 PM ET (22:00 UTC)
    - cron: "0 22 28-31 * 1-5"

  workflow_dispatch:
    inputs:
      phase:
        description: "Which phase to run"
        required: true
        default: "run"
        type: choice
        options:
          - research
          - monitor
          - run
          - cycle
          - reflect
          - weekly
          - monthly
      strategists:
        description: "Which strategist books to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - claude
          - codex
      reset_state:
        description: "Reset stored runtime state before running"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  determine-phase:
    runs-on: ubuntu-latest
    outputs:
      phase: ${{ steps.phase.outputs.phase }}
    steps:
      - name: Determine phase
        id: phase
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "phase=${{ inputs.phase }}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            DOW=$(date -u +%u)   # 1=Monday, 7=Sunday
            DOM=$(date -u +%d)
            if [ "$HOUR" = "14" ] && [ "$MINUTE" -lt "30" ]; then
              echo "phase=research" >> "$GITHUB_OUTPUT"
            elif [ "$HOUR" = "21" ] && [ "$MINUTE" = "15" ]; then
              echo "phase=reflect" >> "$GITHUB_OUTPUT"
            elif [ "$DOW" = "1" ] && [ "$HOUR" = "01" ]; then
              echo "phase=weekly" >> "$GITHUB_OUTPUT"
            elif [ "$HOUR" = "22" ] && [ "$DOM" -ge "28" ]; then
              echo "phase=monthly" >> "$GITHUB_OUTPUT"
            else
              echo "phase=monitor" >> "$GITHUB_OUTPUT"
            fi
          fi

  strategist-run:
    needs: determine-phase
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile_id: claude
            profile_label: Claude Strategist
            cli_provider: claude
            llm_provider: anthropic
            npm_package: "@anthropic-ai/claude-code@latest"
            version_command: "claude --version"
          - profile_id: codex
            profile_label: Codex Strategist
            cli_provider: codex
            llm_provider: openai
            npm_package: "@openai/codex@latest"
            version_command: "codex --version"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -e .

      - name: Install strategist CLI
        run: |
          npm install -g "${{ matrix.npm_package }}"
          ${{ matrix.version_command }}

      - name: Authenticate Codex CLI with API key
        if: matrix.cli_provider == 'codex'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY"
          printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key
          codex login status

      - name: Reset strategist state
        if: github.event_name == 'workflow_dispatch' && inputs.reset_state == true
        env:
          DATA_DIR: data/profiles/${{ matrix.profile_id }}
          AGENT_PROFILE: ${{ matrix.profile_id }}
          AGENT_LABEL: ${{ matrix.profile_label }}
        run: python -m agent_trader reset

      - name: Run strategist pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          DATA_DIR: data/profiles/${{ matrix.profile_id }}
          AGENT_PROFILE: ${{ matrix.profile_id }}
          AGENT_LABEL: ${{ matrix.profile_label }}
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          USE_CLI_AGENT: "true"
          CLI_AGENT_PROVIDER: ${{ matrix.cli_provider }}
          CLI_AGENT_MAX_TURNS: ${{ vars.CLI_AGENT_MAX_TURNS || '5' }}
          CLI_AGENT_TIMEOUT: ${{ vars.CLI_AGENT_TIMEOUT || '300' }}
          LLM_PROVIDER: ${{ matrix.llm_provider }}
        run: |
          PHASE="${{ needs.determine-phase.outputs.phase }}"
          if [ "$PHASE" = "cycle" ]; then
            python -m agent_trader cycle
          else
            python -m agent_trader "$PHASE"
          fi

      - name: Check strategist analysis mode used
        if: always()
        env:
          DATA_DIR: data/profiles/${{ matrix.profile_id }}
          AGENT_PROFILE: ${{ matrix.profile_id }}
          AGENT_LABEL: ${{ matrix.profile_label }}
        run: python -m agent_trader.utils.check_mode

      - name: Upload strategist artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategist-${{ matrix.profile_id }}-${{ needs.determine-phase.outputs.phase }}
          path: data/profiles/${{ matrix.profile_id }}/
          if-no-files-found: warn
          retention-days: 30

  publish-results:
    needs:
      - determine-phase
      - strategist-run
    if: always() && needs.determine-phase.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Pull latest
        run: git pull --ff-only origin main || true

      - name: Reset merged project state
        if: github.event_name == 'workflow_dispatch' && inputs.reset_state == true
        run: python -m agent_trader reset --all-profiles --docs

      - name: Clean previous strategist bundles
        run: |
          rm -rf data/profiles/claude data/profiles/codex docs/data/profiles
          mkdir -p data/profiles docs/data

      - name: Download Claude strategist artifacts
        uses: actions/download-artifact@v4
        with:
          name: strategist-claude-${{ needs.determine-phase.outputs.phase }}
          path: data/profiles/claude

      - name: Download Codex strategist artifacts
        uses: actions/download-artifact@v4
        with:
          name: strategist-codex-${{ needs.determine-phase.outputs.phase }}
          path: data/profiles/codex

      - name: Generate merged dashboard
        run: python -m agent_trader dashboard

      - name: Commit results
        run: |
          git config user.name "Agent Trader Bot"
          git config user.email "bot@agent-trader"
          git add -A data/profiles docs/
          git diff --staged --quiet || git commit -m "[${{ needs.determine-phase.outputs.phase }}] $(date -u +%Y-%m-%d\ %H:%M\ UTC) dual-strategist update"
          git push

  deploy-dashboard:
    needs: publish-results
    runs-on: ubuntu-latest
    if: needs.publish-results.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event.schedule == '30 20 * * 1-5')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Pull latest
        run: git pull --ff-only origin main || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
