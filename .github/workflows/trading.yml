name: Trading Pipeline

on:
  schedule:
    # Monitor & trade — every 30 min during US market hours (weekday cron; Python guard handles exact open/close)
    - cron: "30 13 * * 1-5"
    - cron: "0 14 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "30 15 * * 1-5"
    - cron: "0 16 * * 1-5"
    - cron: "30 16 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "30 17 * * 1-5"
    - cron: "0 18 * * 1-5"
    - cron: "30 18 * * 1-5"
    - cron: "0 19 * * 1-5"
    - cron: "30 19 * * 1-5"
    - cron: "0 20 * * 1-5"
    - cron: "30 20 * * 1-5"
    - cron: "0 21 * * 1-5"

  workflow_dispatch:
    inputs:
      strategists:
        description: "Which strategist books to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - claude
          - codex
      low_cost_mode:
        description: "Use cheapest monitor models plus tighter monitor budgets"
        required: true
        default: true
        type: boolean
      reset_state:
        description: "Reset stored runtime state before running"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  determine-strategists:
    runs-on: ubuntu-latest
    outputs:
      strategist_matrix: ${{ steps.matrix.outputs.strategist_matrix }}
    steps:
      - name: Determine strategist matrix
        id: matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SELECTED_STRATEGISTS="${{ inputs.strategists }}"
          else
            SELECTED_STRATEGISTS="both"
          fi

          if [ "$SELECTED_STRATEGISTS" = "claude" ]; then
            echo 'strategist_matrix=[{"profile_id":"claude","profile_label":"Claude Strategist"}]' >> "$GITHUB_OUTPUT"
          elif [ "$SELECTED_STRATEGISTS" = "codex" ]; then
            echo 'strategist_matrix=[{"profile_id":"codex","profile_label":"Codex Strategist"}]' >> "$GITHUB_OUTPUT"
          else
            echo 'strategist_matrix=[{"profile_id":"claude","profile_label":"Claude Strategist"},{"profile_id":"codex","profile_label":"Codex Strategist"}]' >> "$GITHUB_OUTPUT"
          fi

  strategist-run:
    name: Monitor (${{ matrix.profile_id }})
    needs: determine-strategists
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.determine-strategists.outputs.strategist_matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Reset strategist state
        if: github.event_name == 'workflow_dispatch' && inputs.reset_state == true
        env:
          DATA_DIR: data/profiles/${{ matrix.profile_id }}
          AGENT_PROFILE: ${{ matrix.profile_id }}
          AGENT_LABEL: ${{ matrix.profile_label }}
        run: python -m agent_trader reset

      - name: Print strategist runtime config
        env:
          RUN_MODE: ${{ vars.MONITOR_RUN_MODE || 'paper' }}
          LLM_PROVIDER: openai
          MONITOR_LLM_PROVIDER: openai
          MONITOR_MODEL: ${{ vars.MONITOR_MODEL || 'claude-haiku-4-5-20251001' }}
          MONITOR_MODEL_OPENAI: ${{ vars.MONITOR_MODEL_OPENAI || 'gpt-4o-mini' }}
        run: |
          echo "profile=${{ matrix.profile_id }}"
          echo "phase=monitor"
          echo "api_provider=${LLM_PROVIDER}"
          echo "monitor_provider=${MONITOR_LLM_PROVIDER}"
          echo "run_mode=${RUN_MODE}"
          echo "monitor_model_claude=${MONITOR_MODEL}"
          echo "monitor_model_openai=${MONITOR_MODEL_OPENAI}"
          echo "low_cost_mode=${{ github.event_name == 'workflow_dispatch' && inputs.low_cost_mode || false }}"

      - name: Run strategist monitor pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ matrix.profile_id == 'claude' && secrets.ALPACA_API_KEY_CLAUDE || matrix.profile_id == 'codex' && secrets.ALPACA_API_KEY_CODEX || secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ matrix.profile_id == 'claude' && secrets.ALPACA_SECRET_KEY_CLAUDE || matrix.profile_id == 'codex' && secrets.ALPACA_SECRET_KEY_CODEX || secrets.ALPACA_SECRET_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          DATA_DIR: data/profiles/${{ matrix.profile_id }}
          AGENT_PROFILE: ${{ matrix.profile_id }}
          AGENT_LABEL: ${{ matrix.profile_label }}
          RUN_MODE: ${{ vars.MONITOR_RUN_MODE || 'paper' }}
          LLM_PROVIDER: openai
          MONITOR_LLM_PROVIDER: openai
          MONITOR_MODEL: ${{ vars.MONITOR_MODEL || 'claude-haiku-4-5-20251001' }}
          MONITOR_MODEL_OPENAI: ${{ vars.MONITOR_MODEL_OPENAI || 'gpt-4o-mini' }}
          LLM_MAX_OUTPUT_TOKENS: ${{ github.event_name == 'workflow_dispatch' && inputs.low_cost_mode && '700' || '4000' }}
          LLM_MAX_PROMPT_CHARS: ${{ github.event_name == 'workflow_dispatch' && inputs.low_cost_mode && '16000' || '80000' }}
          MONITOR_CANDIDATE_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.low_cost_mode && '2' || vars.MONITOR_CANDIDATE_LIMIT || '3' }}
        run: python -m agent_trader monitor

      - name: Check strategist analysis mode used
        if: always()
        env:
          DATA_DIR: data/profiles/${{ matrix.profile_id }}
          AGENT_PROFILE: ${{ matrix.profile_id }}
          AGENT_LABEL: ${{ matrix.profile_label }}
          RUN_MODE: ${{ vars.MONITOR_RUN_MODE || 'paper' }}
          LLM_PROVIDER: openai
          MONITOR_LLM_PROVIDER: openai
        run: python -m agent_trader.utils.check_mode

      - name: Upload strategist artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategist-${{ matrix.profile_id }}-monitor
          path: data/profiles/${{ matrix.profile_id }}/
          if-no-files-found: warn
          retention-days: 30

  publish-results:
    needs:
      - determine-strategists
      - strategist-run
    if: always() && needs.determine-strategists.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Pull latest
        run: git pull --ff-only origin main || true

      - name: Reset merged project state
        if: github.event_name == 'workflow_dispatch' && inputs.reset_state == true
        run: python -m agent_trader reset --all-profiles --docs

      - name: Clean previous strategist bundles
        run: |
          rm -rf data/profiles/claude data/profiles/codex docs/data/profiles
          mkdir -p data/profiles docs/data

      - name: Download Claude strategist artifacts
        if: github.event_name != 'workflow_dispatch' || inputs.strategists == 'both' || inputs.strategists == 'claude'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: strategist-claude-monitor
          path: data/profiles/claude

      - name: Download Codex strategist artifacts
        if: github.event_name != 'workflow_dispatch' || inputs.strategists == 'both' || inputs.strategists == 'codex'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: strategist-codex-monitor
          path: data/profiles/codex

      - name: Generate merged dashboard
        run: python -m agent_trader dashboard

      - name: Commit results
        run: |
          git config user.name "Agent Trader Bot"
          git config user.email "bot@agent-trader"
          git add -A data/profiles docs/
          git diff --staged --quiet || git commit -m "[monitor] $(date -u +%Y-%m-%d\ %H:%M\ UTC) dual-strategist update"
          git push

  deploy-dashboard:
    needs: publish-results
    runs-on: ubuntu-latest
    if: needs.publish-results.result == 'success'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Pull latest
        run: git pull --ff-only origin main || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
